name: Publish to npm

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22.19.0'
          registry-url: https://registry.npmjs.org
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm publish --provenance
